    <noscript><div style="color:#F2F4FF;font-family:sans-serif;text-align:center;padding:2em">JavaScriptを有効にすると遊べます。</div></noscript>
    <div id="loaderr" style="display:none;position:fixed;inset:0;background:#0B0F28;color:#F2F4FF;font-family:sans-serif;flex-direction:column;align-items:center;justify-content:center;gap:1em;z-index:9999">

    </div>
    <script>
      // メインスクリプトがロード/起動に失敗した場合だけ、上のフォールバックを出す。
      (function () {
        function showErr() {
          if (window.__hoshifuruBooted) return;
          var e = document.getElementById('loaderr');
          if (e) e.style.display = 'flex';
        }
        window.addEventListener('error', function () { if (!window.__hoshifuruBooted) showErr(); });
        setTimeout(showErr, 9000); // 9秒経っても起動しなければ失敗とみなす
      })();
    </script>
